<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelius Wealth Ledger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { opacity: 0.9; }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            font-size: 1.2em;
            color: #1e3c72;
            margin-bottom: 15px;
            border-bottom: 2px solid #2a5298;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 0.9em;
            color: #555;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1em;
        }
        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(30, 60, 114, 0.3);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .button-group button { flex: 1; }

        .insight-card {
            background: #f8f9fa;
            border-left: 4px solid #2a5298;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
        }
        .insight-card.loading {
            border-left-color: #ffa500;
        }
        .insight-card.response {
            border-left-color: #27ae60;
        }
        .insight-card.error {
            border-left-color: #e74c3c;
        }

        .insight-title {
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        .insight-content {
            color: #555;
            line-height: 1.6;
            font-size: 0.95em;
        }

        .proposal-card {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }
        .proposal-card h3 {
            color: #856404;
            margin-bottom: 10px;
        }
        .proposal-content {
            color: #856404;
            margin-bottom: 15px;
            font-size: 0.95em;
        }

        .approval-buttons {
            display: flex;
            gap: 10px;
        }
        .approval-buttons button {
            flex: 1;
            padding: 12px;
            font-weight: 600;
        }
        .approve-btn {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        }
        .decline-btn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .provenance {
            font-size: 0.85em;
            color: #777;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .provenance-item {
            display: flex;
            justify-content: space-between;
        }
        .provenance-label { font-weight: 600; }
        .provenance-value { color: #555; }

        .trace-link {
            color: #2a5298;
            text-decoration: none;
            cursor: pointer;
        }
        .trace-link:hover { text-decoration: underline; }

        .full-width {
            grid-column: 1 / -1;
        }

        .status {
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        .status.ready { background: #d4edda; color: #155724; }
        .status.running { background: #fff3cd; color: #856404; }
        .status.error { background: #f8d7da; color: #721c24; }

        @media (max-width: 800px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Aurelius Wealth Ledger</h1>
            <p>AI-Powered Wealth Management with Human-in-the-Loop Approval</p>
        </div>

        <div class="main-grid">
            <!-- Input Card -->
            <div class="card">
                <h2>Ask Aurelius</h2>
                <div id="status" class="status ready">Ready</div>
                <div class="input-group">
                    <label for="query">Your Question</label>
                    <textarea id="query" placeholder="e.g., What is my net worth? Or: Rebalance my portfolio to 60% stocks and 40% bonds"></textarea>
                </div>
                <button onclick="sendQuery()">Submit Query</button>
            </div>

            <!-- Agent Insights Card -->
            <div class="card">
                <h2>Agent Insights</h2>
                <div id="insights-container"></div>
            </div>
        </div>

        <!-- Review Proposal Card (hidden by default) -->
        <div id="proposal-card" class="card full-width" style="display: none;">
            <h2>Review Proposal</h2>
            <div class="proposal-card">
                <h3 id="proposal-title">Rebalance Proposal</h3>
                <div id="proposal-content" class="proposal-content"></div>
                <div id="proposal-notes"></div>
                <div class="approval-buttons">
                    <button class="approve-btn" onclick="approveProposal()">Approve</button>
                    <button class="decline-btn" onclick="declineProposal()">Decline</button>
                </div>
            </div>
        </div>

        <!-- Provenance Footer -->
        <div id="provenance" class="card full-width" style="display: none; margin-top: 20px;">
            <div style="margin-bottom: 10px; color: #666; font-weight: 600;">Execution Provenance</div>
            <div class="provenance">
                <div class="provenance-item">
                    <span class="provenance-label">Execution ID:</span>
                    <span class="provenance-value" id="exec-id">—</span>
                </div>
                <div class="provenance-item">
                    <span class="provenance-label">Timestamp:</span>
                    <span class="provenance-value" id="exec-time">—</span>
                </div>
                <div class="provenance-item">
                    <span class="provenance-label">Latency:</span>
                    <span class="provenance-value" id="exec-latency">—</span>
                </div>
                <div class="provenance-item">
                    <span class="provenance-label">Tool Calls:</span>
                    <span class="provenance-value" id="exec-tools">—</span>
                </div>
                <div class="provenance-item" style="grid-column: 1 / -1;">
                    <span class="provenance-label">Trace Link:</span>
                    <a id="trace-link" class="trace-link" target="_blank">Open in Phoenix</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';
        const APP_NAME = 'wealth_agent';
        const USER_ID = 'user_' + Date.now();
        const SESSION_ID = 'session_' + Date.now();

        let currentProposal = null;
        let sessionStartTime = null;

        async function sendQuery() {
            const query = document.getElementById('query').value.trim();
            if (!query) return;

            setStatus('running', 'Sending query...');
            document.querySelector('button').disabled = true;
            document.getElementById('insights-container').innerHTML = '';
            document.getElementById('proposal-card').style.display = 'none';
            document.getElementById('provenance').style.display = 'none';

            sessionStartTime = Date.now();
            const execId = 'exec_' + Date.now();
            const toolCalls = [];

            try {
                // Send query via SSE to frontend /run_sse
                const resp = await fetch(`${API_URL}/run_sse`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: query,
                        user_id: USER_ID,
                        session_id: SESSION_ID
                    })
                });

                if (!resp.body) {
                    throw new Error('No response body');
                }

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');

                    // Process complete messages (keep incomplete last line in buffer)
                    for (let i = 0; i < lines.length - 1; i++) {
                        const line = lines[i].trim();
                        if (line.startsWith('data: ')) {
                            try {
                                const event = JSON.parse(line.substring(6));

                                // Handle response type
                                if (event.type === 'response' && event.content) {
                                    addInsight(event.content, 'response');
                                    if (event.content.includes('rebalance') || event.content.includes('proposal')) {
                                        showProposal(event, query);
                                    }
                                }

                                // Handle trace type
                                if (event.type === 'trace' && event.tool) {
                                    toolCalls.push(event.tool);
                                    addInsight(`Tool: ${event.tool}`, 'loading');
                                }

                                // Handle provenance type
                                if (event.type === 'provenance') {
                                    showProvenance(execId, toolCalls, event);
                                }

                                // Handle errors
                                if (event.type === 'error') {
                                    addInsight(`Error: ${event.content}`, 'error');
                                }
                            } catch (e) {
                                // Skip invalid JSON
                            }
                        }
                    }

                    // Keep incomplete line in buffer
                    buffer = lines[lines.length - 1];
                }

                setStatus('ready', 'Query complete');

            } catch (error) {
                setStatus('error', `Error: ${error.message}`);
                addInsight(`Failed to execute query: ${error.message}`, 'error');
            } finally {
                document.querySelector('button').disabled = false;
            }
        }

        function addInsight(text, type) {
            const container = document.getElementById('insights-container');
            const card = document.createElement('div');
            card.className = `insight-card ${type}`;
            card.innerHTML = `<div class="insight-content">${escapeHtml(text)}</div>`;
            container.appendChild(card);
            container.scrollTop = container.scrollHeight;
        }

        function showProposal(event, query) {
            const queryLower = query.toLowerCase();
            const isRebalance = queryLower.includes('rebalance');
            const isEngagement = queryLower.includes('book') || queryLower.includes('engagement');

            currentProposal = { event, type: isRebalance ? 'rebalance' : 'engagement' };

            const card = document.getElementById('proposal-card');
            const title = document.getElementById('proposal-title');
            const content = document.getElementById('proposal-content');

            if (isRebalance) {
                title.textContent = 'Portfolio Rebalance Proposal';
                content.innerHTML = '<strong>Rebalance to 60% stocks / 40% bonds</strong><br/>Pending your approval before execution.';
            } else {
                title.textContent = 'Concierge Engagement Proposal';
                content.innerHTML = '<strong>Service Engagement</strong><br/>Pending your approval before booking.';
            }

            card.style.display = 'block';
            card.scrollIntoView({ behavior: 'smooth' });
        }

        function approveProposal() {
            if (!currentProposal) return;
            addInsight(`Proposal APPROVED - Executing ${currentProposal.type} request`, 'response');
            document.getElementById('proposal-card').style.display = 'none';
            currentProposal = null;
        }

        function declineProposal() {
            if (!currentProposal) return;
            addInsight(`Proposal DECLINED - Request cancelled`, 'error');
            document.getElementById('proposal-card').style.display = 'none';
            currentProposal = null;
        }

        function showProvenance(execId, toolCalls, provenanceEvent) {
            const latency = Date.now() - sessionStartTime;
            document.getElementById('exec-id').textContent = execId;
            document.getElementById('exec-time').textContent = new Date().toISOString().split('T')[1].split('.')[0];
            document.getElementById('exec-latency').textContent = latency + 'ms';
            document.getElementById('exec-tools').textContent = toolCalls.join(', ') || 'agent delegation';

            // Trace link (would point to Phoenix - format depends on provenance event)
            const traceLink = document.getElementById('trace-link');
            const traceUrl = provenanceEvent?.trace_url || `http://localhost:6006/sessions/${execId}`;
            traceLink.href = traceUrl;
            traceLink.textContent = traceUrl.includes('phoenix') ? 'View Trace in Phoenix Cloud' : 'View Local Trace';

            document.getElementById('provenance').style.display = 'block';
        }

        function setStatus(type, message) {
            const status = document.getElementById('status');
            status.className = `status ${type}`;
            status.textContent = message;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        setStatus('ready', 'Connected - Ready for queries');
    </script>
</body>
</html>
